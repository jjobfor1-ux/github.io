<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>

<body class="bg-zinc-950 text-zinc-200">

    <nav class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="text-3xl font-bold tracking-tight text-emerald-400">Main Portfolio for1</div>
            <div class="flex gap-8 text-sm">
                <a href="#about" class="hover:text-white transition">About</a>

                <div class="p-8">

                    <a href="https://jjobfor1-ux.github.io/seehtml"

            <!-- 다른 프로젝트가 있으면 여기 같은 카드 복사해서 추가하세요 -->
